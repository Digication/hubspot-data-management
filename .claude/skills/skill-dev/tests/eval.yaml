skill: skill-dev
description: Golden dataset for skill-dev — regression tests from dry-run testing rounds
# skill_hash = MD5 of ALL files in the skill directory (excluding tests/ and .plugin-data/).
# Do NOT hash just SKILL.md. Compute with: node scripts/run-eval.mjs --rehash
# Or replicate the logic in scripts/run-eval.mjs → computeSkillHash()
skill_hash: "cc6119ed7c47bfec45ecc923972fe3a3"

cases:
  - name: "invalid-skill-shows-error"
    description: "When skill name doesn't exist, show error with available skills list"
    category: boundary
    inputs:
      command: "/skill-dev review nonexistent-skill"
      state:
        skill_exists: false
    assert:
      - type: contains
        value: "not found"
      - type: contains-any
        values:
          - "Available skills"
          - "available skills"
      - type: contains
        value: "commit"
      - type: contains
        value: "onboard"
      - type: contains-any
        values:
          - "Which skill"
          - "which skill"
      - type: llm-rubric
        rubric: "Error Message Quality"
        context: "User ran /skill-dev review nonexistent-skill — skill name does not exist"
    source: "Exploratory test 2026-03-28, scenario invalid-skill-name"

  - name: "review-history-recent-no-changes"
    description: "Recent review with no changes offers skip/re-review/cancel options"
    category: boundary
    inputs:
      command: "/skill-dev review fake-skill"
      state:
        skill_path: .claude/skills/skill-dev/tests/fixtures/fake-skill
        reviews_log: "2026-03-25 | review | fake-skill | PASS | 2 | Minor issues"
        git_diff_empty: true
        days_since_review: 3
    assert:
      - type: contains
        value: "2026-03-25"
      - type: contains
        value: "PASS"
      - type: contains-all
        values:
          - "Re-review"
          - "Skip to testing"
          - "Cancel"
    source: "Exploratory test 2026-03-28, scenario review-history-recent — previously AMBIGUOUS, fixed"

  - name: "auto-detect-bare-name-reviews-first"
    description: "Bare skill name triggers review first, then offers to test"
    category: happy-path
    inputs:
      command: "/skill-dev fake-skill"
      state:
        skill_exists: true
        skill_path: .claude/skills/skill-dev/tests/fixtures/fake-skill
        reviews_log_empty: true
    assert:
      - type: contains-any
        values:
          - "Review complete"
          - "review complete"
      - type: contains-any
        values:
          - "test this skill"
          - "dry-run"
          - "Want me to test"
    source: "Exploratory test 2026-03-28, scenario auto-detect-bare-name"

  - name: "scenario-arg-runs-single"
    description: "test <skill> <scenario> runs only that scenario with abbreviated report"
    category: boundary
    inputs:
      command: "/skill-dev test fake-skill greet-formal"
      state:
        skill_exists: true
        skill_path: .claude/skills/skill-dev/tests/fixtures/fake-skill
    assert:
      - type: not-contains
        value: "Cross-Scenario Analysis"
      - type: contains-any
        values:
          - "greet-formal"
          - "single scenario"
          - "abbreviated"
    source: "Exploratory test 2026-03-28, scenario test-with-scenario-arg — previously AMBIGUOUS, fixed. Updated to use fake-skill fixture."

  - name: "review-report-has-required-sections"
    description: "Review mode produces report with all required sections and covers all checklist categories"
    category: happy-path
    inputs:
      command: "/skill-dev review fake-skill"
      state:
        skill_exists: true
        skill_path: .claude/skills/skill-dev/tests/fixtures/fake-skill
        reviews_log_empty: true
        review_type: true
    assert:
      - type: contains-all
        values:
          - "Skill Review:"
          - "Summary"
          - "Critical Issues"
          - "Recommendations"
          - "Suggestions"
          - "Strengths"
      - type: contains-any
        values:
          - "Effectiveness"
          - "effectiveness"
      - type: contains-any
        values:
          - "bare Bash"
          - "Bare Bash"
          - "bare `Bash`"
          - "Bash without"
      - type: llm-rubric
        rubric: "Review Quality"
        context: "Full review of the fake-skill fixture at .claude/skills/skill-dev/tests/fixtures/fake-skill/ with no prior review history. The skill intentionally has bare Bash in allowed-tools (a known issue the review should catch). The agent must use the review-specific prompt from TEST_PROTOCOL.md."
    source: "SKILL.md lines 82-89 define the required report format. Updated to use fake-skill fixture. Added Effectiveness and bare-Bash assertions to catch the L3 failure mode."

  - name: "scenario-approval-table-format"
    description: "Explore mode presents scenarios in the specified table format before running"
    category: happy-path
    inputs:
      command: "/skill-dev test fake-skill --explore"
      state:
        skill_exists: true
        skill_path: .claude/skills/skill-dev/tests/fixtures/fake-skill
    assert:
      - type: contains-all
        values:
          - "Name"
          - "Category"
          - "What it tests"
      - type: contains-any
        values:
          - "Ready to run"
          - "ready to run"
      - type: llm-rubric
        rubric: "Test Scenario Quality"
        context: "Exploratory test scenarios designed for the fake-skill fixture at .claude/skills/skill-dev/tests/fixtures/fake-skill/. The skill has a 3-row decision table (name+casual, name+formal, no-name) and bare Bash in allowed-tools."
    source: "SKILL.md lines 114-122 define scenario approval format. Updated to use fake-skill fixture."

  - name: "no-args-lists-skills"
    description: "No arguments shows available skills and asks which one"
    category: boundary
    inputs:
      command: "/skill-dev"
      state: {}
    assert:
      - type: contains-any
        values:
          - "commit"
          - "onboard"
          - "task"
      - type: contains-any
        values:
          - "Which skill"
          - "which skill"
          - "What would you like"
    source: "Exploratory test 2026-03-28, scenario no-args-flow"

  - name: "full-mode-l2-fail-still-offers-l4"
    description: "In --full mode, Layer 2 failure skips L3 but still offers Layer 4"
    category: regression
    inputs:
      command: "/skill-dev test someskill --full"
      state:
        layer1_result: PASS
        layer2_result: "first case FAIL"
        has_eval_yaml: true
    assert:
      - type: contains
        value: "FAIL"
      - type: contains-any
        values:
          - "Layer 4"
          - "exploratory"
          - "Exploratory"
      - type: contains-any
        values:
          - "Ready to run"
          - "ready to run"
          - "Want me to run"
          - "run exploratory"
      - type: not-contains
        value: "Layer 3: LLM-as-Judge — PASS"
    source: "Exploratory test 2026-03-30, scenario full-l2-fail-still-offers-l4"

  - name: "layer-3-standalone-no-rubrics-reports-pass"
    description: "--layer 3 with no llm-rubric assertions reports PASS with a note"
    category: regression
    inputs:
      command: "/skill-dev test someskill --layer 3"
      state:
        has_eval_yaml: true
        has_llm_rubrics: false
    assert:
      - type: contains
        value: "PASS"
      - type: contains-any
        values:
          - "no rubrics"
          - "No rubrics"
          - "no llm-rubric"
          - "No llm-rubric"
          - "zero rubrics"
    source: "Exploratory test 2026-03-30, scenario layer-3-standalone-no-rubrics"

  - name: "full-mode-l1-fail-stops-everything"
    description: "In --full mode, Layer 1 failure stops all layers including Layer 4"
    category: regression
    inputs:
      command: "/skill-dev test someskill --full"
      state:
        layer1_result: FAIL
    assert:
      - type: contains
        value: "FAIL"
      - type: not-contains
        value: "Ready to run"
      - type: not-contains
        value: "ready to run"
      - type: contains-any
        values:
          - "Fix"
          - "fix"
          - "structural"
          - "Structural"
    source: "Exploratory test 2026-03-30, scenario full-l1-fail-stops-everything"

  - name: "default-test-l2-skip-cascades-to-l3-skip"
    description: "Default test with no eval.yaml skips both L2 and L3, reports PARTIAL"
    category: regression
    inputs:
      command: "/skill-dev test someskill"
      state:
        layer1_result: PASS
        has_eval_yaml: false
    assert:
      - type: contains
        value: "PARTIAL"
      - type: contains-any
        values:
          - "No golden dataset"
          - "no eval.yaml"
          - "Skipped"
      - type: contains-any
        values:
          - "--explore"
          - "explore"
    source: "Exploratory test 2026-03-30, scenario default-test-l2-skip-cascades"

  - name: "single-scenario-missing-eval-yaml"
    description: "test <skill> <scenario> when eval.yaml doesn't exist should error cleanly, not silently fail"
    category: regression
    inputs:
      command: "/skill-dev test fake-skill greet-formal"
      state:
        skill_exists: true
        skill_path: .claude/skills/skill-dev/tests/fixtures/fake-skill
        has_eval_yaml: false
    assert:
      - type: contains-any
        values:
          - "No golden dataset"
          - "no eval.yaml"
          - "eval.yaml does not exist"
          - "no fixture file"
      - type: contains-any
        values:
          - "--explore"
          - "explore"
      - type: not-contains
        value: "Which case would you like to run"
    source: "Exploratory test 2026-03-30, scenario single-scenario-missing-eval — Bug: Single Scenario section has no handling for missing eval.yaml"

  - name: "review-history-multi-mode-most-recent"
    description: "When log has both review and test entries, the most recent entry (regardless of mode) triggers the skip/re-review/cancel prompt"
    category: regression
    inputs:
      command: "/skill-dev review fake-skill"
      state:
        skill_exists: true
        skill_path: .claude/skills/skill-dev/tests/fixtures/fake-skill
        reviews_log: |
          2026-03-27 | review | fake-skill | PASS | 2 | Minor issues found
          2026-03-29 | test --full | fake-skill | PARTIAL | 8 | L2 3/4 PASS, L4 ambiguous
        git_diff_empty: true
        days_since_review: 1
    assert:
      - type: contains
        value: "2026-03-29"
      - type: contains-all
        values:
          - "Re-review"
          - "Skip to testing"
          - "Cancel"
      - type: not-contains
        value: "Running a fresh review"
    source: "Exploratory test 2026-03-30, scenario review-history-multi-mode-entries — Ambiguity: spec says 'use the most recent one' without filtering by mode"

  - name: "review-history-exact-7-day-boundary"
    description: "Review exactly 7 days old does NOT trigger skip prompt — spec says < 7 days ago, and 7 is not < 7"
    category: regression
    inputs:
      command: "/skill-dev review fake-skill"
      state:
        skill_exists: true
        skill_path: .claude/skills/skill-dev/tests/fixtures/fake-skill
        reviews_log: "2026-03-23 | review | fake-skill | PASS | 1 | Clean review"
        git_diff_empty: true
        days_since_review: 7
        current_date: "2026-03-30"
    assert:
      - type: not-contains
        value: "Re-review"
      - type: not-contains
        value: "Skip to testing"
      - type: not-contains
        value: "Cancel"
      - type: contains-any
        values:
          - "Skill Review:"
          - "validate-skill"
          - "Running"
          - "review"
    source: "Exploratory test 2026-03-30, scenario review-history-exact-7-day-boundary — Ambiguity: prose 'last 7 calendar days' vs formal '< 7 days ago' disagree at boundary"

  - name: "test-findings-suggest-retrospective"
    description: "When test mode finds Bug or Ambiguity issues, suggest retrospective"
    category: happy-path
    inputs:
      command: "/skill-dev test fake-skill"
      state:
        skill_exists: true
        skill_path: .claude/skills/skill-dev/tests/fixtures/fake-skill
        expected_findings:
          - type: Bug
            description: "Bare Bash in allowed-tools not flagged"
    assert:
      - type: contains-any
        values:
          - "/retrospective"
          - "retrospective"
          - "capture"
          - "learning"
    source: "Phase 4 — test findings suggest retrospective"

  - name: "baseline-mode-runs-comparison"
    description: "Baseline mode produces a with/without skill comparison report"
    category: happy-path
    inputs:
      command: "/skill-dev baseline fake-skill"
      state:
        skill_exists: true
        skill_path: .claude/skills/skill-dev/tests/fixtures/fake-skill
    assert:
      - type: contains-all
        values:
          - "With Skill"
          - "Without Skill"
      - type: contains-any
        values:
          - "Delta"
          - "Impact"
          - "Helps"
          - "Neutral"
          - "Hurts"
    source: "Phase 5 — baseline comparison mode"

  - name: "triggers-mode-generates-query-set"
    description: "Triggers mode creates should/should-not trigger queries and scores them"
    category: happy-path
    inputs:
      command: "/skill-dev triggers fake-skill --dry-run"
      state:
        skill_exists: true
        skill_path: .claude/skills/skill-dev/tests/fixtures/fake-skill
    assert:
      - type: contains-all
        values:
          - "should trigger"
          - "should not"
      - type: contains-any
        values:
          - "precision"
          - "recall"
          - "F1"
          - "accuracy"
    source: "Phase 6 — trigger optimization mode"

  - name: "test-mode-offers-html-viewer"
    description: "After test run completes, skill offers to open HTML viewer"
    category: happy-path
    inputs:
      command: "/skill-dev test fake-skill"
      state:
        skill_exists: true
        skill_path: .claude/skills/skill-dev/tests/fixtures/fake-skill
    assert:
      - type: contains-any
        values:
          - "HTML"
          - "viewer"
          - "browser"
          - "open"
          - "generate-viewer"
    source: "Phase 7 — browser viewer after test"
