<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200" font-family="system-ui, sans-serif">

  <!-- Background -->
  <rect width="900" height="200" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">The 5 Steps Inside Every Cycle</text>

  <!-- Arrows between boxes -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Arrow: Discover → Analyze -->
  <line x1="172" y1="110" x2="218" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrow: Analyze → Approve -->
  <line x1="342" y1="110" x2="388" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrow: Approve → Apply -->
  <line x1="512" y1="110" x2="558" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrow: Apply → Measure -->
  <line x1="682" y1="110" x2="728" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Loop back arrow under the boxes -->
  <path d="M820,150 Q820,178 450,178 Q80,178 80,150" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="450" y="195" text-anchor="middle" font-size="10" fill="#64748b">if HIGH / MEDIUM issues remain → next cycle</text>

  <!-- Box 1: Discover -->
  <rect x="50" y="72" width="122" height="76" rx="10" fill="#7c3aed"/>
  <text x="111" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="white">Discover</text>
  <text x="111" y="118" text-anchor="middle" font-size="11" fill="#ddd6fe">Opus subagent</text>
  <text x="111" y="136" text-anchor="middle" font-size="10" fill="#ede9fe">finds issues + scores</text>

  <!-- Box 2: Analyze -->
  <rect x="220" y="72" width="122" height="76" rx="10" fill="#0369a1"/>
  <text x="281" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="white">Analyze</text>
  <text x="281" y="118" text-anchor="middle" font-size="11" fill="#bae6fd">Sonnet · main</text>
  <text x="281" y="136" text-anchor="middle" font-size="10" fill="#e0f2fe">writes proposals</text>

  <!-- Box 3: Approve -->
  <rect x="390" y="72" width="122" height="76" rx="10" fill="#b45309"/>
  <text x="451" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="white">Approve</text>
  <text x="451" y="118" text-anchor="middle" font-size="11" fill="#fde68a">You</text>
  <text x="451" y="136" text-anchor="middle" font-size="10" fill="#fef3c7">A / R / M each one</text>

  <!-- Box 4: Apply -->
  <rect x="560" y="72" width="122" height="76" rx="10" fill="#0369a1"/>
  <text x="621" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="white">Apply</text>
  <text x="621" y="118" text-anchor="middle" font-size="11" fill="#bae6fd">Sonnet · main</text>
  <text x="621" y="136" text-anchor="middle" font-size="10" fill="#e0f2fe">edits the file</text>

  <!-- Box 5: Measure -->
  <rect x="730" y="72" width="122" height="76" rx="10" fill="#7c3aed"/>
  <text x="791" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="white">Measure</text>
  <text x="791" y="118" text-anchor="middle" font-size="11" fill="#ddd6fe">Opus subagent</text>
  <text x="791" y="136" text-anchor="middle" font-size="10" fill="#ede9fe">re-scores from scratch</text>

</svg>
