<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" width="520" height="340" font-family="system-ui, sans-serif">

  <rect width="520" height="340" fill="#f8fafc" rx="12"/>
  <text x="260" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">How the Loop Decides to Continue or Stop</text>

  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Measure box -->
  <rect x="170" y="48" width="180" height="50" rx="10" fill="#7c3aed"/>
  <text x="260" y="70" text-anchor="middle" font-size="13" font-weight="700" fill="white">Measure completes</text>
  <text x="260" y="88" text-anchor="middle" font-size="11" fill="#ddd6fe">score + remaining issues</text>

  <!-- Arrow down -->
  <line x1="260" y1="98" x2="260" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Decision diamond -->
  <polygon points="260,132 360,165 260,198 160,165" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="260" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="white">HIGH or MEDIUM</text>
  <text x="260" y="176" text-anchor="middle" font-size="11" font-weight="700" fill="white">issues left?</text>

  <!-- YES path → left → check cycle limit -->
  <line x1="160" y1="165" x2="90" y2="165" stroke="#64748b" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="122" y="158" text-anchor="middle" font-size="11" font-weight="600" fill="#ef4444">YES</text>

  <!-- Cycle limit diamond -->
  <polygon points="50,165 90,200 50,235 10,200" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="50" y="196" text-anchor="middle" font-size="10" font-weight="700" fill="white">Cycle</text>
  <text x="50" y="209" text-anchor="middle" font-size="10" font-weight="700" fill="white">limit?</text>

  <!-- NO from cycle limit → next cycle -->
  <line x1="90" y1="200" x2="130" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="108" y="193" text-anchor="middle" font-size="10" fill="#22c55e">NO</text>
  <rect x="132" y="182" width="100" height="36" rx="8" fill="#15803d"/>
  <text x="182" y="197" text-anchor="middle" font-size="11" font-weight="700" fill="white">Next cycle</text>
  <text x="182" y="211" text-anchor="middle" font-size="10" fill="#bbf7d0">→ Discover again</text>

  <!-- YES from cycle limit → warn -->
  <line x1="50" y1="235" x2="50" y2="265" stroke="#64748b" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="62" y="255" font-size="10" fill="#ef4444">YES</text>
  <rect x="10" y="267" width="125" height="42" rx="8" fill="#b45309"/>
  <text x="72" y="284" text-anchor="middle" font-size="11" font-weight="700" fill="white">Warn + ask</text>
  <text x="72" y="299" text-anchor="middle" font-size="10" fill="#fef3c7">"Continue? Y/N"</text>

  <!-- NO path → right → convergence -->
  <line x1="360" y1="165" x2="430" y2="165" stroke="#64748b" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="392" y="158" text-anchor="middle" font-size="11" font-weight="600" fill="#22c55e">NO</text>

  <rect x="432" y="140" width="78" height="52" rx="10" fill="#166534"/>
  <text x="471" y="161" text-anchor="middle" font-size="12" font-weight="700" fill="white">DONE</text>
  <text x="471" y="177" text-anchor="middle" font-size="10" fill="#bbf7d0">Convergence</text>

  <!-- LOW label note -->
  <rect x="150" y="218" width="220" height="36" rx="8" fill="#fef9c3" stroke="#fde047" stroke-width="1"/>
  <text x="260" y="233" text-anchor="middle" font-size="11" font-weight="600" fill="#713f12">LOW severity issues</text>
  <text x="260" y="248" text-anchor="middle" font-size="10" fill="#854d0e">never trigger another cycle</text>

</svg>
