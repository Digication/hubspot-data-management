tests:
  - name: Create a new spec document
    prompt: |
      I want to create a new document about payment processing architecture.
      It should be a spec that covers the technical design.
    expected_behavior: |
      Claude should:
      1. Ask for the document slug (suggests "payment-processing-architecture")
      2. Ask for document type (suggests "spec")
      3. Ask if user wants an interview to clarify scope
      4. Call doc-scaffold to create the structure
      5. Show the spec template with placeholders
      6. Suggest next steps (start writing or request review)
    checks:
      - Document folder created with index.md and meta.yaml
      - meta.yaml has status: draft, type: spec
      - index.md contains spec template
      - git commit created with document creation message

  - name: Give feedback on a document
    prompt: |
      /doc
      [select existing document]
      I want to give feedback on this
      The error handling section is incomplete. It mentions errors but doesn't list them all.
    expected_behavior: |
      Claude should:
      1. Ask who the feedback is from (default to user context)
      2. Parse the feedback
      3. Create a review file with structured format
      4. Show status of the feedback with next steps
      5. Optionally notify reviewer via Slack
    checks:
      - Review file created with correct naming
      - Feedback item has [MEDIUM] priority (content-dependent)
      - Feedback is quoted from the document
      - based_on_commit is recorded

  - name: Address feedback as owner
    prompt: |
      /doc
      [select document in-review status]
      I want to address the feedback
      [see pending feedback items]
      Accept the first item
    expected_behavior: |
      Claude should:
      1. Show pending items sorted by priority
      2. Present four options: accept, modify, won't-fix, need-clarification
      3. Apply accepted changes
      4. Record resolution in review file
      5. Move to next pending item
    checks:
      - Review file updated with resolution
      - Document content updated to address feedback
      - Item status changed to "accepted"
      - Resolution timestamp and author recorded

  - name: Approve a document
    prompt: |
      /doc
      [select document with all feedback addressed]
      I'm ready to approve this
    expected_behavior: |
      Claude should:
      1. Run fresh-eyes review (check for completeness, stale language, broken links)
      2. Show any issues found
      3. Ask for confirmation
      4. Update meta.yaml with current_version: 1 and record commit hash in versions map
      5. Commit the updated meta.yaml
      6. Notify via Slack (if connected)
    checks:
      - meta.yaml updated with current_version and versions entry (commit hash, approved_at, approved_by)
      - Status changed to "approved"
      - Approval timestamp recorded

  - name: Smart next step suggestions
    prompt: |
      /doc
      [open a draft document with empty content]
    expected_behavior: |
      Claude should suggest:
      "Want to start writing? Here's your template."
    checks:
      - Suggestion matches document state

  - name: Research before writing
    prompt: |
      I want to research payment processing patterns before writing the spec.
      Research from web and internal docs.
    expected_behavior: |
      Claude should:
      1. Ask for focus questions
      2. Search web for payment patterns
      3. Check internal docs in docs/ folder
      4. Compile findings into research/index.md
      5. Create research/references/ with source files
      6. Ask if user is ready to write based on findings
    checks:
      - research/index.md created with summary, sources, open questions
      - reference files created for distinct topics
      - HISTORY.md updated with research event
      - Sources linked in index.md

  - name: Detect stale feedback
    prompt: |
      /doc
      [given a document where content changed after review was created]
    expected_behavior: |
      Claude should:
      1. Read based_on_commit from review
      2. Diff the base commit against HEAD
      3. Flag items as potentially stale
      4. Ask if user wants to resolve or mark for rework
    checks:
      - Stale items are detected
      - User can decide to keep or rework items
      - Review file can be updated with new status

  - name: Interview mode for scope clarification
    prompt: |
      /doc create
      [user unsure about scope]
      I'm not sure what this document should cover
    expected_behavior: |
      Claude should:
      1. Shift to question mode
      2. Ask 3-5 focused questions: audience, key decisions, constraints, scope boundaries
      3. Summarize understanding
      4. Ask "Did I get that right?"
      5. Offer to use summary for draft scaffolding
    checks:
      - Questions are focused and one at a time
      - Summary is provided before proceeding
      - Confirmation requested
    assert:
      - type: llm-rubric
        rubric: plain-language-guidance
        criteria: |
          PASS if: Output uses everyday language; technical terms (git, meta.yaml, slug, status) are either avoided or defined inline; no unexplained acronyms; conversational tone that guides rather than commands.
          FAIL if: Output assumes the user knows git concepts, yaml syntax, or document lifecycle jargon without explanation.

  - name: Request review with context
    prompt: |
      /doc
      [select draft or in-review document]
      I want to request a review
      Reviewer: Jeff
      Type: Specific expertise
      Focus: Payment retry logic, error handling
    expected_behavior: |
      Claude should:
      1. Set status to in-review if not already
      2. Send Slack notification to Jeff with:
         - Link to document
         - What kind of review is needed
         - Specific focus areas
         - Context (link to payment architecture docs, etc.)
      3. Log review request in git commit
    checks:
      - Slack notification formatted correctly
      - Review request logged in commit message
      - Status changed to in-review

  - name: Archive document
    prompt: |
      /doc
      [select approved document]
      This is no longer needed
      I want to archive it
    expected_behavior: |
      Claude should:
      1. Warn about any other docs that reference it
      2. Ask for confirmation
      3. Move document to docs/archives/<slug>/
      4. Update docs/index.md
      5. Explain how to unarchive if needed later
    checks:
      - Document moved to archives/
      - Index updated
      - Git commit shows move

  - name: Sync index consistency
    prompt: |
      /doc sync
    expected_behavior: |
      Claude should:
      1. Compare docs/index.md against all HISTORY.md files
      2. Report any mismatches (version, status, owner, date)
      3. Ask for confirmation before fixing
      4. Update index to match source of truth
    checks:
      - Mismatches detected
      - User can confirm before changes
      - Index synchronized

  - name: Next step engine draft with content
    prompt: |
      /doc [open a draft document that has substantive content — Overview, Goals, and Technical Design sections filled in]
    expected_behavior: |
      Claude should:
      1. Check Next Step Engine table top-to-bottom, first match wins
      2. Skip row 1 (draft, empty) because document has content
      3. Match row 2 (draft, has content) → suggest "Ready to submit for review?"
    checks:
      - Next Step Engine matches "draft, has content" row
      - Suggestion includes submitting for review
    assert:
      - type: contains-any
        values:
          - "submit for review"
          - "ready for review"
          - "Ready to submit"
      - type: decision-trace
        input: "status = draft, content = non-empty (sections filled)"
        rule: "Next Step Engine (draft, has content)"
        result: "Suggest submitting for review"
      - type: llm-rubric
        rubric: next-step-relevance
        criteria: |
          PASS if: The suggestion specifically matches the "draft, has content" row of the Next Step Engine table; mentions submitting for review; does not suggest generic actions unrelated to document state.
          FAIL if: Suggestion is generic (e.g., "keep writing", "do something"), skips the correct row, or suggests an action the user can't take (e.g., approve when not owner).
    category: regression
    source: "Found during exploratory test on 2026-04-02, scenario next-step-draft-with-content"

  - name: Contradictory feedback flagged to owner
    prompt: |
      /doc [select document in-review with two contradictory reviews]
      I want to address the feedback.
      Review 1 (jeff): "Retry logic should use exponential backoff" [HIGH]
      Review 2 (sarah): "Retry logic should use fixed intervals — exponential backoff is overkill" [HIGH]
    expected_behavior: |
      Claude should:
      1. Detect that the two reviews contradict each other on retry strategy
      2. Flag the conflict to the owner before proceeding
      3. Let the owner decide which approach to follow
      Per Concurrency table: "Contradictory feedback → Claude flags conflicts; owner decides"
    checks:
      - Contradiction is detected and surfaced
      - Owner is asked to decide
      - Neither review is auto-accepted without owner input
    assert:
      - type: contains-any
        values:
          - "conflict"
          - "contradict"
          - "opposing"
          - "disagree"
      - type: contains-any
        values:
          - "decide"
          - "which approach"
          - "your call"
    category: regression
    source: "Found during exploratory test on 2026-04-02, scenario contradictory-feedback-resolution"

  - name: Contributor can edit but not approve
    prompt: |
      /doc [select document owned by ly, contributor sarah]
      User is sarah (contributor).
      Step 1: Sarah says "I want to edit the Technical Design section" (should be allowed)
      Step 2: Sarah says "I want to approve this document" (should be denied)
    expected_behavior: |
      Claude should:
      1. Check Permissions table: sarah is not owner, is contributor
      2. Step 1: Allow edit (contributors can "Edit content, add research")
      3. Step 2: Deny approval (only owner can "change status")
      4. Explain who can approve (the owner, ly)
    checks:
      - Edit is allowed for contributor
      - Approval is denied for contributor
      - Owner name mentioned in denial
    assert:
      - type: contains-any
        values:
          - "edit"
          - "update"
          - "change"
      - type: contains-any
        values:
          - "only the owner"
          - "owner can approve"
          - "can't approve"
          - "cannot approve"
      - type: decision-trace
        input: "user = sarah (contributor), action = approve"
        rule: "Permissions (Contributor can: Edit content, add research)"
        result: "Deny — approval is owner-only"
      - type: llm-rubric
        rubric: permission-boundary-enforcement
        criteria: |
          PASS if: Edit action is allowed with clear explanation that contributors can edit content; approval action is denied with a specific explanation naming the owner and stating that only the owner can change status; no ambiguity about who can do what.
          FAIL if: Either action is handled incorrectly (edit denied, or approve allowed), or the denial is vague and doesn't explain who can approve or why.
    category: regression
    source: "Found during exploratory test on 2026-04-02, scenario contributor-edit-boundary"

  - name: Owner transfer succeeds
    prompt: |
      /doc [select draft document owned by ly]
      User is ly (owner).
      "I want to transfer ownership to sarah"
    expected_behavior: |
      Claude should:
      1. Check Permissions: ly is owner → can transfer
      2. Update meta.yaml: owner changed to sarah
      3. Commit with reason
      4. Optionally notify via Slack
    checks:
      - Permission check passes (owner can transfer)
      - meta.yaml owner field updated
      - Git commit records the transfer with reason
    assert:
      - type: contains-any
        values:
          - "transfer"
          - "ownership"
          - "new owner"
      - type: contains
        value: "sarah"
      - type: decision-trace
        input: "user = ly (owner), action = transfer to sarah"
        rule: "Permissions (Owner can: transfer)"
        result: "Allow — update meta.yaml owner to sarah"
    category: regression
    source: "Found during exploratory test on 2026-04-02, scenario owner-transfer-workflow"

  - name: Next step approved stale
    prompt: |
      /doc [open a document with status: approved, last git commit to the document folder was 45 days ago]
    expected_behavior: |
      Claude should:
      1. Evaluate Next Step Engine top-to-bottom, first match wins
      2. Match row: "approved, 30+ days inactive" → suggest "Still current?"
      3. Not skip this row or suggest a different action
    checks:
      - Next Step Engine matches "approved, 30+ days inactive" row
      - Suggestion asks whether the document is still current
    assert:
      - type: contains-any
        values:
          - "Still current"
          - "still current"
          - "still relevant"
          - "up to date"
      - type: decision-trace
        input: "status = approved, last activity = 45 days ago"
        rule: "Next Step Engine (approved, 30+ days inactive)"
        result: "Suggest checking if still current"
    category: regression
    source: "Found during exploratory test on 2026-04-02, scenario next-step-approved-stale"

  - name: Feedback need clarification blocks item
    prompt: |
      /doc [select document in-review]
      User is owner. Feedback item present:
      "### 1. Consider abstracting the retry decorator [MEDIUM]
      Status: pending
      > 'The retry logic is implemented inline' — Technical Design
      This is fine but could be cleaner."
      Owner says: "I don't understand what they mean. Need clarification."
    expected_behavior: |
      Claude should:
      1. Map action to "need clarification"
      2. Update item status to needs-clarification in review file
      3. Notify reviewer via Slack (or mention it will do so)
      4. Skip this item and move to the next pending one
      Per Address Feedback: "Items with needs-clarification are blocked — Claude skips them"
    checks:
      - Item status set to needs-clarification
      - Item is skipped (not resolved, not applied)
      - Reviewer is notified via Slack
    assert:
      - type: contains-any
        values:
          - "needs-clarification"
          - "need clarification"
          - "needs clarification"
      - type: contains-any
        values:
          - "skip"
          - "move on"
          - "next item"
          - "blocked"
      - type: decision-trace
        input: "owner action = need clarification on item 1"
        rule: "Address Feedback (need clarification — item blocked, skip to next)"
        result: "Mark needs-clarification, notify reviewer, skip item"
    category: regression
    source: "Found during exploratory test on 2026-04-02, scenario feedback-need-clarification"

  - name: Rename shows cross-references before confirming
    prompt: |
      /doc [select document "payment-processing-architecture"]
      User is owner. User says: "Rename this to payments-api-design."
      Two other docs link to this document.
    expected_behavior: |
      Claude should:
      1. Scan all docs for cross-references to "payment-processing-architecture"
      2. Show the affected files to the user before making any changes
      3. Ask for confirmation
      4. Only rename and update references after confirmation
      Per Rename workflow: "Claude scans all docs for cross-references, shows affected files, updates on confirmation"
    checks:
      - Affected files listed before any changes
      - Confirmation requested
      - Rename only proceeds after user confirms
    assert:
      - type: contains-any
        values:
          - "cross-reference"
          - "link"
          - "references"
          - "affected"
      - type: contains-any
        values:
          - "confirm"
          - "proceed"
          - "ready"
          - "shall I"
      - type: decision-trace
        input: "action = rename, cross-references found in 2 other docs"
        rule: "Rename workflow (scan cross-references, show affected, confirm, then update)"
        result: "Show affected files, ask for confirmation before renaming"
    category: regression
    source: "Found during exploratory test on 2026-04-02, scenario rename-with-cross-references"

  - name: External edit detected at workflow start
    prompt: |
      /doc [user opens doc skill]
      Before any workflow begins, git status shows:
      docs/payment-processing-architecture/index.md is modified (uncommitted, edited outside the tool)
    expected_behavior: |
      Claude should:
      1. Detect the uncommitted change via git status
      2. Surface it to the user before starting any workflow
      3. Offer options to handle it (commit or revert/stash)
      4. Not silently continue with the workflow
      Per Concurrency table: "Document edited outside tool → git status detects; Claude offers to commit or revert"
    checks:
      - Uncommitted change is detected and surfaced
      - User is given options before workflow continues
      - Workflow does not silently proceed
    assert:
      - type: contains-any
        values:
          - "edited outside"
          - "changed outside"
          - "uncommitted"
          - "modified"
      - type: contains-any
        values:
          - "commit"
          - "revert"
          - "stash"
          - "discard"
      - type: decision-trace
        input: "git status = docs/payment-processing-architecture/index.md modified"
        rule: "Concurrency (document edited outside tool — detect and surface)"
        result: "Surface change, offer commit or revert before continuing"
    category: regression
    source: "Found during exploratory test on 2026-04-02, scenario edit-outside-tool"

